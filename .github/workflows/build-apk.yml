name: Build Chemistry APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'

    # أمر بناء نظيف تماماً بدون أي معاملات قد تسبب لبس لـ Gradle
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
